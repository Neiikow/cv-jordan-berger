  <div *ngIf="user">
    <div class="mb-3 avatar d-flex justify-content-center">
      <div class="badge"></div>
      <div class="img d-flex justify-content-center">
        <img src="{{ user.picture }}" alt="avatar">
      </div>
    </div>
    <p>{{ user.username }}</p>
    <p>{{ user.email }}</p>
    <p>{{ user.age }} ans</p>
    <hr>
    <p>{{ user.street }}</p>
    <p>{{ user.postal }}</p>
    <p>{{ user.city }}</p>
    <p>{{ user.phone }}</p>
  </div>
