<div *ngIf="languages">
    <div class="item d-flex justify-content-between align-items-center" *ngFor="let language of languages">
        <div>
            <p>{{ language.name }}</p>
        </div>
        <div>
            <button class="edit" *ngIf="isAuth('ROLE_ADMIN')" (click)="edit(language)" title="Editer"><i class="fas fa-pen"></i></button>
            <button class="delete" *ngIf="isAuth('ROLE_ADMIN')" (click)="delete(language)" title="Supprimer"><i class="fas fa-times"></i></button>
        </div>
    </div>
</div>
