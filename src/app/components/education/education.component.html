<div *ngIf="educations">
    <button class="item d-flex justify-content-between align-items-center" *ngFor="let education of educations">
        <div class="text-left">
            <p class="mb-0 text-uppercase font-weight-bold">{{ education.title }}</p>
            <p class="font-italic font-weight-light">{{ education.company }} ({{ education.startyear }}<span *ngIf="education.endyear"> - {{ education.endyear }}</span>)</p>
            <p class="item-about">{{ education.about }}</p>
        </div>
        <div>
            <button class="edit" *ngIf="isAuth('ROLE_ADMIN')" (click)="edit(education)" title="Editer"><i class="fas fa-pen"></i></button>
            <button class="delete" *ngIf="isAuth('ROLE_ADMIN')" (click)="delete(education)" title="Supprimer"><i class="fas fa-times"></i></button>        
        </div>
    </button>
</div>
