<div *ngIf="experiences">
    <button class="item d-flex justify-content-between" *ngFor="let experience of experiences"
    (click)="experience.active=!experience.active" [class.active]="experience.active">
        <div class="text-left">
            <p class="mb-0 text-uppercase font-weight-bold">{{ experience.function }}</p>
            <p class="font-italic font-weight-light">{{ experience.company }} ({{ experience.startyear }}<span *ngIf="experience.startyear != experience.endyear"> - {{ experience.endyear }}</span>)</p>
            <p class="item-about" [innerHTML]="experience.about"></p>
        </div>
        <div class="d-flex nowrap">
            <button class="edit" *ngIf="isAuth('ROLE_ADMIN')" (click)="edit(experience)" title="Editer"><i class="fas fa-pen"></i></button>
            <button class="delete" *ngIf="isAuth('ROLE_ADMIN')" (click)="delete(experience)" title="Supprimer"><i class="fas fa-times"></i></button>        
        </div>
    </button>
</div>
