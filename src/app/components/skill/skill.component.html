<div *ngIf="skills">
    <button class="item d-flex justify-content-between" *ngFor="let skill of skills"
    (click)="skill.active=!skill.active" [class.active]="skill.active">
        <div class="text-left">
            <p>{{ skill.title }}</p>
            <p class="item-about" [innerHTML]="skill.details"></p>
        </div>
        <div class="d-flex nowrap">
            <button class="edit" *ngIf="isAuth('ROLE_ADMIN')" (click)="edit(skill)" title="Editer"><i class="fas fa-pen"></i></button>
            <button class="delete" *ngIf="isAuth('ROLE_ADMIN')" (click)="delete(skill)" title="Supprimer"><i class="fas fa-times"></i></button>
        </div>
    </button>
</div>
